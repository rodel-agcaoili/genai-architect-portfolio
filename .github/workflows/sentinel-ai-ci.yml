name: Deploy SentinelAI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'projects/02-sentinel-ai/**'
  workflow_dispatch: # Allows manual 'hydrate' execution

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        cd projects/02-sentinel-ai
        pip install -r requirements-test.txt

    - name: Run Synthetic Mock Tests
      run: |
        cd projects/02-sentinel-ai
        python test_remediator.py

  terraform-apply:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: test # Only deploy if Moto mock tests pass
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      
    - name: Clean Previous Builds
      run: |
        rm -rf projects/02-sentinel-ai/remediator.zip

    - name: Terraform Init & Apply
      run: |
        cd projects/02-sentinel-ai
        terraform init
        terraform apply -auto-approve
